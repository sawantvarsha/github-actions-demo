name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_NAME: angular-app2
      IMAGE_TAG: v1

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Repository Cloned
      run: echo "Repository cloned successfully"

    - name: Print Build Info
      run: |
        echo "Starting Docker Build"
        echo "Docker Username: $DOCKER_USERNAME"
        echo "Image Name: $IMAGE_NAME"
        echo "Image Tag: $IMAGE_TAG"

    - name: Verify Files
      run: |
        echo "Checking repository files..."
        pwd
        ls -la

    - name: Login to DockerHub
      run: |
        echo "Logging into DockerHub..."
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_USERNAME" --password-stdin
        echo "DockerHub Login Successful"

    - name: Build Docker Image
      run: |
        echo "Building Docker Image..."
        echo "Image: $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG"
        docker build -t "$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG" .
        echo "Docker Image Built Successfully"

    - name: Show Docker Images After Build
      run: |
        echo "Available Docker Images:"
        docker images

    - name: Push Docker Image
      run: |
        echo "Pushing Image: $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG"
        docker push "$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG"
        echo "Push Completed Successfully"

    - name: Final Docker Images
      run: |
        echo "Final Docker Images:"
        docker images

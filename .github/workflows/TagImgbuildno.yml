name: Build and Push Docker Image

on:
  push:
    branches:
      - SIT

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_NAME: angular-app2

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Repository Cloned
      run: echo "Repository cloned successfully"

    - name: Set Build Variables
      run: |
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
        echo "COMMIT_ID=${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

    - name: Print Build Info
      run: |
        echo "Starting Docker Build"
        echo "Docker Username: $DOCKER_USERNAME"
        echo "Image Name: $IMAGE_NAME"
        echo "Build Number: $BUILD_NUMBER"
        echo "Commit ID: $COMMIT_ID"
        echo "Branch Name: $BRANCH_NAME"

    - name: Verify Files
      run: |
        echo "Checking repository files..."
        pwd
        ls -la

    - name: Login to DockerHub
      run: |
        echo "Logging into DockerHub..."
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_USERNAME" --password-stdin
        echo "DockerHub Login Successful"

    - name: Build Docker Image
      run: |
        echo "Building Docker Image..."
        echo "Image: $DOCKER_USERNAME/$IMAGE_NAME:$BUILD_NUMBER-$COMMIT_ID"

        docker build \
        -t "$DOCKER_USERNAME/$IMAGE_NAME:$BUILD_NUMBER-$COMMIT_ID" \
        -t "$DOCKER_USERNAME/$IMAGE_NAME:latest" \
        .

        echo "Docker Image Built Successfully"

    - name: Show Docker Images After Build
      run: |
        echo "Available Docker Images:"
        docker images

    - name: Push Docker Images
      run: |
        echo "Pushing Image with Build Tag..."
        docker push "$DOCKER_USERNAME/$IMAGE_NAME:$BUILD_NUMBER-$COMMIT_ID"

        echo "Pushing Latest Tag..."
        docker push "$DOCKER_USERNAME/$IMAGE_NAME:latest"

        echo "Push Completed Successfully"

    - name: Final Docker Images
      run: |
        echo "Final Docker Images:"
        docker images
